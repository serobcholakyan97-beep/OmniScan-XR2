name: Python Package using Conda

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Conda Environment
      uses: conda-incubator/setup-miniconda@v3
      with:
        # Must match the 'name' field in your environment.yml
        activate-environment: omniscan-backend 
        environment-file: environment.yml
        auto-activate-base: false
        use-mamba: true 

    - name: Lint with flake8
      # shell: bash -l {0} is required to use the conda environment
      shell: bash -l {0}
      run: |
        # Stop the build if there are Python syntax errors
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all other errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      shell: bash -l {0}
      run: |
        # This tells Python to look in the root folder for the 'backend' package
        export PYTHONPATH=$PYTHONPATH:.
        pytest
        
