name: Python Package using Conda

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Add Conda to system path
      run: |
        echo $CONDA/bin >> $GITHUB_PATH

    - name: Install Dependencies
      run: |
        # Pointing to the specific 'omniscan-backend' directory to find environment.yml
        conda env update --file omniscan-backend/environment.yml --name base
        # Installing critical AAA+ grade dependencies for NASA services
        pip install flake8 pytest httpx python-dotenv fastapi uvicorn earthaccess

    - name: Lint with flake8
      run: |
        # Strict linting focused on the backend folder while ignoring virtual environments
        flake8 ./omniscan-backend --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=venv

    - name: Run Automated Tests with pytest
      run: |
        # Executing tests within the backend scope
        pytest omniscan-backend/
